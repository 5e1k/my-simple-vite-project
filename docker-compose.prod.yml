services:
  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ghcr.io/5e1k/my-simple-vite-project-backend:latest
    container_name: demo-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: demo_db
      DB_USER: demo_user
      DB_PASSWORD: demo_password
      JWT_SECRET: super-secret-demo-key

  frontend:
    image: ghcr.io/5e1k/my-simple-vite-project-frontend:latest
    container_name: demo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data: